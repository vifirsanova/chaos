<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CHAOS :: GLASS TERMINAL</title>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <!-- Background Blobs for Glass Effect -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="container">
        <div class="header">
            <div>
	        <span>[CHAOS::TERMINAL]</span>
                <span class="status"></span>
            </div>
            <div class="hourglass" id="hourglass">⧗</div>
        </div>
        
        <div class="nav" id="nav">
            <div class="nav-item active" data-view="global">[F1] GLOBAL</div>
            <div class="nav-item" data-view="private">[F2] PRIVATE</div>
            <div class="nav-item" data-view="feed">[F3] FEED</div>
            <div class="nav-item" data-view="myvoid">[F4] MY VOID</div>
            <div class="nav-item" data-view="manifest">[F5] MANIFEST</div>
        </div>    
        
        <div class="chat-container" id="chatContainer">
            <!-- Global Chat View -->
            <div class="view active" id="view-global"></div>
            
            <!-- Private Messages View -->
            <div class="view" id="view-private"></div>
            
            <!-- Feed View - NO LOADING LINE -->
            <div class="view" id="view-feed"></div>
            
            <!-- My Void View -->
            <div class="view" id="view-myvoid"></div>
            
            <!-- Manifest View -->
            <div class="view" id="view-manifest">
                <div class="message system">
                    <div class="content">
                        <pre>
MANIFESTO

1. NO FOLLOWS. NO LIKES. NO ALGORITHMS.
2. THE VOID IS YOURS.
3. THIS IS NOT A SOCIAL NETWORK.
                        </pre>
                    </div>
                </div>
            </div>
        </div>

        <!-- Icon panel - all rounded -->
        <div class="icon-panel">
            <button class="glass-icon-btn" title="Encrypt"><i class="fa-solid fa-lock"></i></button>
            <button class="glass-icon-btn" title="Burn after read"><i class="fa-solid fa-fire"></i></button>
            <button class="glass-icon-btn" title="Ghost mode"><i class="fa-solid fa-ghost"></i></button>
            <button class="glass-icon-btn" title="Broadcast"><i class="fa-solid fa-wifi"></i></button>
        </div>

        <div class="input-area" id="inputArea">
            <div class="input-wrapper">
                <input type="text" placeholder="> type your message..." id="messageInput">
                <button id="attachBtn"><i class="fa-solid fa-paperclip"></i></button>
            </div>
            <button id="sendBtn"><i class="fa-solid fa-paper-plane"></i></button>
        </div>        

        <input type="file" id="fileInput" style="display: none;" multiple>
        
        <div class="status">
            <a href="https://github.com/vifirsanova/chaos/tree/master/docs" target="_blank" rel="noopener noreferrer">ENCRYPTED</a> :: v0.3 // GLASS        
	</div>
    </div>

    <script src="./js/script.js"></script>
</body>
</html>
