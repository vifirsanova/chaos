version: '3.8'

services:
  postgres-test:
    image: postgres:15
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: test_chaos
    ports:
      - "5433:5432"  # другой порт, чтобы не конфликтовать с основной БД
    tmpfs:
      - /var/lib/postgresql/data  # данные в памяти для скорости